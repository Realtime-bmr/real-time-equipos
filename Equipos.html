<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Time — Disponibilidad Equipos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #f0f3f7;
    --surface: #ffffff;
    --surface2: #e8ecf2;
    --border: #d0d8e4;
    --accent: #F0A500;
    --accent2: #c48000;
    --green: #16a34a;
    --yellow: #ca8a04;
    --orange: #ea580c;
    --red: #dc2626;
    --text: #334155;
    --text-dim: #94a3b8;
    --text-bright: #0f172a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    background: #ffffff;
    border-bottom: 2px solid var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-wrap { display: flex; align-items: center; }
  .logo-wrap img { height: 40px; width: auto; }
  .header-divider { width: 1px; height: 36px; background: var(--border); margin: 0 20px; }
  .header-title { font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--text-bright); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  #fecha-activa {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--accent);
    background: rgba(240,165,0,0.08);
    border: 1px solid rgba(240,165,0,0.25);
    padding: 5px 12px; border-radius: 4px; letter-spacing: 1px;
  }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .reload-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); padding: 5px 14px; border-radius: 4px;
    font-family: 'Rajdhani', sans-serif; font-size: 13px; cursor: pointer;
    letter-spacing: 1px; transition: all .2s;
  }
  .reload-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* UPLOAD */
  #upload-zone {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: calc(100vh - 64px); gap: 20px;
  }
  .upload-card {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 56px 72px; text-align: center; cursor: pointer;
    transition: all .3s; background: var(--surface); max-width: 500px; width: 100%;
  }
  .upload-card:hover, .upload-card.drag-over { border-color: var(--accent); background: rgba(240,165,0,0.04); }
  .upload-icon { font-size: 48px; margin-bottom: 14px; }
  .upload-card h2 { font-size: 19px; color: var(--text-bright); letter-spacing: 2px; margin-bottom: 8px; }
  .upload-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
  .upload-btn {
    background: var(--accent); color: #ffffff; border: none;
    padding: 9px 26px; border-radius: 6px;
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
    font-weight: 700; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: opacity .2s;
  }
  .upload-btn:hover { opacity: .85; }
  #file-input { display: none; }

  /* DASHBOARD */
  #dashboard { display: none; padding: 20px 24px; }

  .day-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .day-bar label { font-size: 11px; color: var(--text-dim); letter-spacing: 1.5px; margin-right: 6px; text-transform: uppercase; }
  .day-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); padding: 4px 11px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: all .2s;
  }
  .day-btn:hover { border-color: var(--accent2); color: var(--text); }
  .day-btn.active { background: rgba(240,165,0,0.12); border-color: var(--accent); color: var(--accent); }

  /* KPIs */
  .kpi-row { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 18px; flex: 1; min-width: 140px;
    position: relative; overflow: hidden;
  }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); }
  .kpi label { font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .kpi .val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; color: var(--text-bright); }
  .kpi .sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

  .section-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: ''; display: block; width: 10px; height: 2px; background: var(--accent); }

  /* EQUIP CARD */
  .equip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 9px; margin-bottom: 24px; }
  .equip-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 13px 14px; position: relative;
    transition: transform .15s, border-color .15s; cursor: default;
  }
  .equip-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 2px 12px rgba(240,165,0,0.15); }
  .equip-name { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--text-bright); margin-bottom: 10px; text-transform: uppercase; }

  /* dual metrics row */
  .metrics-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .metric-block { flex: 1; }
  .metric-label { font-size: 9px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .bar-wrap { position: relative; background: rgba(0,0,0,0.06); border-radius: 999px; height: 5px; overflow: hidden; margin-bottom: 3px; }
  .bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }
  .pct-label { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }

  /* utilization bar color is always accent (gold) */
  .bar-util { background: var(--accent) !important; opacity: 1; }

  .status-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 9px; letter-spacing: 1px; padding: 2px 6px;
    border-radius: 999px; font-weight: 700; text-transform: uppercase;
  }

  /* semaforo colors */
  .s-green  .bar-disp { background: var(--green); }
  .s-green  .pct-disp { color: var(--green); }
  .s-green  .status-badge { background: rgba(22,163,74,0.1); color: var(--green); border: 1px solid rgba(22,163,74,0.3); }
  .pct-util { color: var(--accent2); }

  .s-yellow .bar-disp { background: var(--yellow); }
  .s-yellow .pct-disp { color: var(--yellow); }
  .s-yellow .status-badge { background: rgba(202,138,4,0.1); color: var(--yellow); border: 1px solid rgba(202,138,4,0.3); }

  .s-orange .bar-disp { background: var(--orange); }
  .s-orange .pct-disp { color: var(--orange); }
  .s-orange .status-badge { background: rgba(234,88,12,0.1); color: var(--orange); border: 1px solid rgba(234,88,12,0.3); }

  .s-red    .bar-disp { background: var(--red); }
  .s-red    .pct-disp { color: var(--red); }
  .s-red    .status-badge { background: rgba(220,38,38,0.1); color: var(--red); border: 1px solid rgba(220,38,38,0.3); }

  .cat-section { margin-bottom: 28px; }
  .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 820px) { .grid-2col { grid-template-columns: 1fr; } }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
  /* ── FLEET SUMMARY ── */
  .fleet-summary {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .fleet-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 150px;
    position: relative; overflow: hidden;
  }
  .fleet-card::after {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 3px;
  }
  .fleet-card.fc-green::after  { background: var(--green); }
  .fleet-card { box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .fleet-card.fc-yellow::after { background: var(--yellow); }
  .fleet-card.fc-orange::after { background: var(--orange); }
  .fleet-card.fc-red::after    { background: var(--red); }
  .fleet-name { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }
  .fleet-disp-row { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 6px; }
  .fleet-disp-val { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1; }
  .fleet-disp-label { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
  .fleet-bar-wrap { background: rgba(0,0,0,0.06); border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 6px; }
  .fleet-bar-fill { height: 100%; border-radius: 999px; }
  .fleet-eq-row { display: flex; align-items: center; justify-content: space-between; }
  .fleet-eq-label { font-size: 10px; color: #64748b; }
  .fleet-eq-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text-bright); }
</style>
</head>

        <div class="equip-grid" id="grid-jumbos"></div>
      </div>
      <div class="cat-section">
        <div class="section-title">Carguío — SCOOPS</div>
        <div class="equip-grid" id="grid-scoops"></div>
      </div>
    </div>
    <div>
      <div class="cat-section">
        <div class="section-title">Transporte — CAMIONES</div>
        <div class="equip-grid" id="grid-camiones"></div>
      </div>
      <div class="cat-section">
        <div class="section-title">Equipo de Levante — MANITOUS</div>
        <div class="equip-grid" id="grid-manitous"></div>
      </div>
      <div class="cat-section">
        <div class="section-title">Apoyo — VARIOS</div>
        <div class="equip-grid" id="grid-varios"></div>
      </div>
    </div>
  </div>
</div>

<script>
let allData = {};
let currentDay = null;
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxQeG-UsNg5drRXPatNqTvEUbMBasyh7vD_C16a0faMrEXDsUUSp21MdNcsShuwteAK/exec';

async function loadFromSheets() {
  const icon  = document.querySelector('#upload-zone .upload-icon');
  const title = document.querySelector('#upload-zone h2');
  const desc  = document.querySelector('#upload-zone p');
  const btn   = document.getElementById('manual-btn');

  if (icon)  icon.textContent  = '⏳';
  if (title) title.textContent = 'Cargando datos...';
  if (desc)  desc.textContent  = 'Conectando con Google Sheets...';

  try {
    const res = await fetch(SHEETS_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    allData = {};
    json.forEach(item => {
      const ws = XLSX.utils.aoa_to_sheet(item.data);
      const rows = parseSheet(ws);
      if (rows.length) allData[item.sheet.trim()] = rows;
    });
    if (Object.keys(allData).length > 0) {
      initDashboard();
    } else {
      throw new Error('Sin datos');
    }
  } catch(err) {
    console.warn('Sheets load failed:', err);
    if (icon)  icon.textContent  = '📂';
    if (title) title.textContent = 'Cargar Real Time';
    if (desc)  desc.textContent  = 'No se pudo conectar. Carga el archivo manualmente.';
    if (btn)   btn.style.display = 'inline-block';
  }
}
window.addEventListener('load', () => loadFromSheets());

// Auto-refresh every 5 minutes with countdown
let refreshSeconds = 5 * 60;
function updateCountdown() {
  const el = document.getElementById('refresh-countdown');
  if (!el) return;
  const m = Math.floor(refreshSeconds / 60);
  const s = refreshSeconds % 60;
  el.textContent = '↺ ' + m + ':' + String(s).padStart(2, '0');
  refreshSeconds--;
  if (refreshSeconds < 0) {
    refreshSeconds = 5 * 60;
    loadFromSheets();
  }
}
setInterval(updateCountdown, 1000);


const dropArea = document.getElementById('drop-area');
['dragenter','dragover'].forEach(ev => dropArea.addEventListener(ev, e => { e.preventDefault(); dropArea.classList.add('drag-over'); }));
['dragleave','drop'].forEach(ev => dropArea.addEventListener(ev, e => { e.preventDefault(); dropArea.classList.remove('drag-over'); }));
dropArea.addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    allData = {};
    wb.SheetNames.forEach(name => {
      const rows = parseSheet(wb.Sheets[name]);
      if (rows.length) allData[name.trim()] = rows;
    });
    initDashboard();
  };
  reader.readAsArrayBuffer(file);
}

// SKIP rows that are section labels, not individual equipos
const SKIP_NAMES = new Set(['CINABRIO/SAN ANDRES','MTS PERFORADOS','TIROS PERFORADOS',
  'SIMBAS DISPONIBLES','JUMBOS DISPONIBLES','CAMIONES DISPONIBLES','SCOOP DISPONIBLES',
  'EQUIPO','FLOTA','PROMEDIO']);

function calcDispFromHours(row) {
  // Fallback: calculate disponibilidad from hourly slots
  // non-Fs slots / total slots
  const slots = row.slice(5, 17).filter(v => v !== null && v !== undefined);
  if (!slots.length) return null;
  const fs = slots.filter(v => typeof v === 'string' && v.trim().toUpperCase().startsWith('FS')).length;
  return (slots.length - fs) / slots.length;
}

function calcUtil(row) {
  // Col U (index 20) = DISPONIBILIDAD directo del Excel (Stby = disponible)
  // Utilización = minutos operativos (valores numéricos) / (slots no-Fs * 60)
  // Stby/Trd no cuentan como minutos operativos
  // Fs no cuenta para el denominador (no estaba disponible)
  const slots = row.slice(5, 17).filter(v => v !== null && v !== undefined);
  if (!slots.length) return null;

  const availSlots = slots.filter(v => !(typeof v === 'string' && v.trim().toUpperCase().startsWith('FS')));
  if (!availSlots.length) return 0;

  const opMins = availSlots.reduce((sum, v) => {
    return sum + (typeof v === 'number' && v > 0 ? v : 0);
  }, 0);

  return opMins / (availSlots.length * 60);
}

function parseSheet(ws) {
  const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  const detailMapA = {}, detailMapB = {};
  const fleetRawA  = {}, fleetRawB  = {};
  const FLEET_TOTALS = { SIMBAS:3, JUMBOS:4, SCOOPS:3, CAMIONES:10, MANITOUS:3 };
  let currentTurno = null;

  // Labels to skip
  const SKIP = new Set(['CINABRIO/SAN ANDRES','MTS PERFORADOS','TIROS PERFORADOS',
    'SIMBAS DISPONIBLES','JUMBOS DISPONIBLES','CAMIONES DISPONIBLES','SCOOP DISPONIBLES',
    'EQUIPO','FLOTA','PROMEDIO']);

  for (let r = 0; r < json.length; r++) {
    const row = json[r] || [];

    // ── Turno detection: col5 (index 5) = 'TURNO A' / 'TURNO B' ──
    const c5 = row[5];
    if (typeof c5 === 'string') {
      const t = c5.trim().toUpperCase();
      if (t === 'TURNO A') { currentTurno = 'A'; continue; }
      if (t === 'TURNO B') { currentTurno = 'B'; continue; }
    }

    // ── Only process rows inside a turno block ──
    if (!currentTurno) continue;

    const c3 = row[3];
    const c4 = row[4];

    // Fleet DISPONIBLES rows: col3 contains 'DISPONIBLES', col4 = count
    if (typeof c3 === 'string' && c3.toUpperCase().includes('DISPONIBLES') && typeof c4 === 'number') {
      const lbl = c3.toUpperCase();
      const fk  = lbl.includes('SIMBA') ? 'SIMBAS'
                : lbl.includes('JUMBO') ? 'JUMBOS'
                : lbl.includes('CAMION') ? 'CAMIONES'
                : lbl.includes('SCOOP') ? 'SCOOPS'
                : lbl.includes('MANITOU') ? 'MANITOUS' : null;
      if (fk) {
        if (currentTurno === 'A' && fleetRawA[fk] === undefined) fleetRawA[fk] = c4;
        if (currentTurno === 'B' && fleetRawB[fk] === undefined) fleetRawB[fk] = c4;
      }
      continue;
    }

    // Individual equipo rows: col3=name, col20=disp (%)
    if (typeof c3 !== 'string' || !c3.trim()) continue;
    const nameKey = c3.trim().toUpperCase();
    if (SKIP.has(nameKey)) continue;

    // Col V (index 21) = DISPONIBILIDAD (desde 14.03 en adelante)
    // Col U (index 20) = UTILIZACIÓN (desde 14.03) / DISPONIBILIDAD (días anteriores)
    // Lógica: si col V tiene valor numérico → V=disp, U=util
    //         si col V está vacía           → U=disp (formato antiguo), util desde horas
    const colV = row[21];
    const colU = row[20];
    const hasV = typeof colV === 'number';
    const dispFinal = hasV ? colV : (typeof colU === 'number' ? colU : null);
    const utilFinal = hasV ? (typeof colU === 'number' ? colU : calcUtil(row))
                           : calcUtil(row);
    if (dispFinal === null) continue;
    const entry = { disp: dispFinal, util: utilFinal, name: c3.trim() };

    if (currentTurno === 'A' && !detailMapA[nameKey]) detailMapA[nameKey] = entry;
    if (currentTurno === 'B' && !detailMapB[nameKey]) detailMapB[nameKey] = entry;
  }

  // Merge turno A & B
  const allKeys = new Set([...Object.keys(detailMapA), ...Object.keys(detailMapB)]);
  const equipos = [];
  allKeys.forEach(key => {
    const a = detailMapA[key], b = detailMapB[key];
    const both = a && b;
    const disp = both ? (a.disp + b.disp) / 2 : (a || b).disp;
    const uA   = a ? a.util : null, uB = b ? b.util : null;
    const util = (uA !== null && uB !== null) ? (uA + uB) / 2 : (uA !== null ? uA : uB);
    const displayName = (a || b).name;
    equipos.push({ equipo: displayName, pct: disp, util });
  });

  // Fleet summary
  const fleetSummary = {};
  const allFleets = new Set([...Object.keys(fleetRawA), ...Object.keys(fleetRawB)]);
  allFleets.forEach(fk => {
    const vA = fleetRawA[fk] !== undefined ? fleetRawA[fk] : null;
    const vB = fleetRawB[fk] !== undefined ? fleetRawB[fk] : null;
    const dispCount = (vA !== null && vB !== null) ? (vA + vB) / 2
                    : (vA !== null ? vA : vB);
    const total     = FLEET_TOTALS[fk] || null;
    const dispPct   = total ? dispCount / total : null;
    fleetSummary[fk] = { dispCount: Math.round(dispCount * 10) / 10, total, dispPct };
  });

  equipos._fleetSummary = fleetSummary;
  return equipos;
}


function initDashboard() {
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  const days = Object.keys(allData);
  if (!days.length) return;
  const container = document.getElementById('day-buttons');
  container.innerHTML = '';
  days.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.textContent = d;
    btn.onclick = () => selectDay(d);
    container.appendChild(btn);
  });
  selectDay(days[days.length - 1]);
}

function selectDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.textContent === day));
  document.getElementById('fecha-activa').textContent = day;
  renderDay(allData[day]);
}

function getStatus(pct) {
  if (pct >= 0.85) return { cls: 's-green',  label: 'OK' };
  if (pct >= 0.60) return { cls: 's-yellow', label: 'ATENCIÓN' };
  if (pct >= 0.30) return { cls: 's-orange', label: 'BAJO' };
  return                  { cls: 's-red',    label: 'CRÍTICO' };
}

function renderGrid(id, list) {
  const el = document.getElementById(id);
  if (!list.length) { el.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:6px">Sin datos</div>'; return; }
  el.innerHTML = list.map(e => {
    const disp = e.pct;
    const util = e.util;
    const st = getStatus(disp);
    const dispPct = Math.round(disp * 100);
    const utilPct = util !== null ? Math.round(util * 100) : null;
    const utilBlock = utilPct !== null ? `
      <div class="metric-block">
        <div class="metric-label">Utilización</div>
        <div class="bar-wrap"><div class="bar-fill bar-util" style="width:${utilPct}%"></div></div>
        <div class="pct-label pct-util">${utilPct}%</div>
      </div>` : '';
    return `
      <div class="equip-card ${st.cls}">
        <div class="status-badge">${st.label}</div>
        <div class="equip-name">${e.equipo}</div>
        <div class="metrics-row">
          <div class="metric-block">
            <div class="metric-label">Disponibilidad</div>
            <div class="bar-wrap"><div class="bar-fill bar-disp" style="width:${dispPct}%"></div></div>
            <div class="pct-label pct-disp">${dispPct}%</div>
          </div>
          ${utilBlock}
        </div>
      </div>`;
  }).join('');
}

const CAT_CAMION = ['DR-TW','LH-JL','HZ-PV','DR-XP','DL-TJ','CW-YY','DW-CP','CX-ZL','KX-ZH'];

function renderDay(equipos) {
  const cats = { simbas:[], jumbos:[], scoops:[], manitous:[], varios:[], camiones:[] };
  equipos.forEach(e => {
    const n = e.equipo.toUpperCase();
    if (n.startsWith('SIMBA'))  { cats.simbas.push(e); return; }
    if (n.startsWith('JUMBO'))  { cats.jumbos.push(e); return; }
    if (n.startsWith('SCOOP'))  { cats.scoops.push(e); return; }
    if (n.startsWith('MANITOU')){ cats.manitous.push(e); return; }
    if (n.startsWith('ALJIBE') || n.startsWith('SURTIDOR') || n.startsWith('RETRO') || n.startsWith('CARGADOR')) { cats.varios.push(e); return; }
    if (CAT_CAMION.some(p => n.startsWith(p))) { cats.camiones.push(e); return; }
    cats.varios.push(e);
  });
  renderGrid('grid-simbas', cats.simbas);
  renderGrid('grid-jumbos', cats.jumbos);
  renderGrid('grid-scoops', cats.scoops);
  renderGrid('grid-camiones', cats.camiones);
  renderGrid('grid-manitous', cats.manitous);
  renderGrid('grid-varios', cats.varios);
  renderKPIs(equipos, cats);
  renderFleetSummary(equipos._fleetSummary || {}, cats);
}

function renderKPIs(equipos, cats) {
  const avg = arr => arr.length ? arr.reduce((s,e)=>s+e.pct,0)/arr.length : null;
  const avgUtil = arr => { const v = arr.filter(e=>e.util!==null); return v.length ? v.reduce((s,e)=>s+e.util,0)/v.length : null; };
  const pctLabel = v => v === null ? '—' : Math.round(v*100)+'%';
  const overall = avg(equipos);
  const overallUtil = avgUtil(equipos);
  const criticos = equipos.filter(e => e.pct < 0.30).length;
  const bajos    = equipos.filter(e => e.pct >= 0.30 && e.pct < 0.60).length;
  const buenos   = equipos.filter(e => e.pct >= 0.85).length;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><label>Disponibilidad Global</label><div class="val">${pctLabel(overall)}</div><div class="sub">${equipos.length} equipos</div></div>
    <div class="kpi"><label>Utilización Global</label><div class="val" style="color:var(--accent)">${pctLabel(overallUtil)}</div><div class="sub">promedio flota</div></div>
    <div class="kpi"><label>Equipos OK ≥85%</label><div class="val" style="color:var(--green)">${buenos}</div><div class="sub">operativos</div></div>
    <div class="kpi"><label>En Atención</label><div class="val" style="color:var(--yellow)">${bajos}</div><div class="sub">entre 30% y 84%</div></div>
    <div class="kpi"><label>Críticos &lt;30%</label><div class="val" style="color:var(--red)">${criticos}</div><div class="sub">fuera de servicio</div></div>
    <div class="kpi"><label>Util. Camiones</label><div class="val" style="color:var(--accent)">${pctLabel(avgUtil(cats.camiones))}</div><div class="sub">${cats.camiones.length} camiones</div></div>
    <div class="kpi"><label>Util. Simbas</label><div class="val" style="color:var(--accent)">${pctLabel(avgUtil(cats.simbas))}</div><div class="sub">${cats.simbas.length} equipos</div></div>
  `;
}

function renderFleetSummary(fleet, cats) {
  const order = [
    { key: 'SIMBAS',   label: 'Simbas',   arr: cats.simbas   },
    { key: 'JUMBOS',   label: 'Jumbos',   arr: cats.jumbos   },
    { key: 'CAMIONES', label: 'Camiones', arr: cats.camiones },
    { key: 'SCOOPS',   label: 'Scoops',   arr: cats.scoops   },
    { key: 'MANITOUS', label: 'Manitous', arr: cats.manitous },
  ];

  const parts = order.map(function(item) {
    var key = item.key, label = item.label, arr = item.arr;
    var f = fleet[key];
    var dispPct, dispCount, total;
    if (f) {
      dispPct   = f.dispPct;
      dispCount = f.dispCount;
      total     = f.total;
    } else {
      total     = arr.length;
      dispCount = arr.filter(function(e){ return e.pct >= 0.50; }).length;
      dispPct   = total ? dispCount / total : null;
    }

    var pctNum   = dispPct !== null ? Math.round(dispPct * 100) : null;
    var pctStr   = pctNum !== null ? pctNum + '%' : '—';
    var barW     = pctNum !== null ? pctNum : 0;
    var colorCls = !pctNum || pctNum >= 85 ? 'fc-green'
                 : pctNum >= 60 ? 'fc-yellow'
                 : pctNum >= 30 ? 'fc-orange' : 'fc-red';
    var barColor = !pctNum || pctNum >= 85 ? 'var(--green)'
                 : pctNum >= 60 ? 'var(--yellow)'
                 : pctNum >= 30 ? 'var(--orange)' : 'var(--red)';
    var countStr = (dispCount !== null && total) ? (dispCount + ' / ' + total) : '—';

    return '<div class="fleet-card ' + colorCls + '">'
      + '<div class="fleet-name">' + label + '</div>'
      + '<div class="fleet-disp-row">'
      + '<div class="fleet-disp-val" style="color:' + barColor + '">' + pctStr + '</div>'
      + '<div class="fleet-disp-label">disponibilidad</div>'
      + '</div>'
      + '<div class="fleet-bar-wrap">'
      + '<div class="fleet-bar-fill" style="width:' + barW + '%;background:' + barColor + '"></div>'
      + '</div>'
      + '<div class="fleet-eq-row">'
      + '<span class="fleet-eq-label">Equipos disponibles</span>'
      + '<span class="fleet-eq-val">' + countStr + '</span>'
      + '</div>'
      + '</div>';
  });

  document.getElementById('fleet-summary').innerHTML = parts.join('');
}
</script>
</body>
</html>
